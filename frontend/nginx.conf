server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy — forwards /api/ calls to the backend service ──
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Load Provider Portal (native HTML — bypasses Flutter canvas) ──
    # Serves the Stitch-designed HTML/CSS/JS portal for load_owner companies.
    location /load-provider/ {
        # Serve actual files; no fallback to Flutter's index.html
        try_files $uri $uri/ /load-provider/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Flutter SPA — all other routes ────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Flutter wasm, fonts, icons, etc.)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|wasm|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the Flutter entry point
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;
}
